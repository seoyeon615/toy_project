<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>로그인</title>
        {% comment %}
        <link rel="stylesheet" href="{% static 'css/login.css' %}" />
        {% endcomment %}
        <style>
            body {
                background-color: #ffffff;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                font-family: sans-serif;
            }

            /* 로그인 영역 전체를 감싸는 상자 */
            .login-box {
                width: 100%;
                max-width: 360px;
                padding: 50px;
                text-align: center; /* 내부 요소들 중앙 정렬 */
            }

            /* 로고 이미지 스타일 */
            .logo {
                max-width: 180px; /* 로고 크기 조절 */
                height: auto;
                margin-bottom: 20px;
            }

            /* 에러 메시지 박스 */
            .error-msg {
                color: red;
                font-size: 14px;
                margin-bottom: 15px;
            }

            /* 입력창 아래 간격 주려고 만든 그룹 */
            .input-group {
                margin-bottom: 20px;
            }

            /* 아이디, 비밀번호 입력창 스타일 */
            .input-group input {
                width: 100%;
                padding: 15px;
                padding-right: 100px;
                box-sizing: border-box;
                border: 1px solid #ccc;
                border-radius: 10px;
            }

            /* 로그인 버튼 스타일 */
            .submit-btn {
                width: 100%;
                padding: 12px;
                background-color: #0a2e65;
                color: white;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 10px;
            }

            /* 하단 회원가입 링크 */
            .signup-link {
                display: inline-block;
                margin-top: 20px;
                color: #666;
                text-decoration: none;
                font-size: 14px;
            }
        </style>
    </head>
    <body>
        <div class="login-container">
            {% comment %}
            <div class="logo">
                <img
                    src="{% static 'img/1968aca1-6184-4799-a8ac-c3e90184cdc8 1.svg' %}"
                    clss="logo-icon"
                    width="170"
                />
            </div>
            {% endcomment %}
            <h1>로그인</h1>

            {% if error %}
            <div class="error-box">
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="input-group">
                    <label for="username" style="font-weight: 500"
                        >아이디</label
                    >
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="아이디를 입력하세요."
                        required
                    />
                </div>

                <div class="input-group">
                    <label for="password" style="font-weight: 500"
                        >비밀번호</label
                    >
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="비밀번호를 입력하세요."
                        required
                    />
                </div>

                <input type="checkbox" id="save-id" />
                <label for="save-id">아이디 저장</label>

                <button type="submit" class="submit-btn">로그인</button>

                <div class="form-footer">
                    <a href="#">아이디 찾기</a>
                    <a href="#">비밀번호 찾기</a>
                    <a href="{% url 'users:signup' %}" class="signup-link"
                        >회원가입</a
                    >
                </div>
            </form>
        </div>
    </body>
</html>
