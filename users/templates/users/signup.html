{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멋사대학교 회원가입</title>
    <link rel="stylesheet" href="{% static 'css/reviewSignup.css' %}" />
</head>
<body>
    <div class="signup-container">
        <h2>멋사대학교 회원가입</h2>
        <div class="announcement">
            <p>멋사대학교 계정으로 <span class="emphasize">시험 후기 게시판</span>을<span></span></p>
            <p>포함한 다양한 대학생 서비스를 모두 이용하실 수 있습니다.</p>
        </div>

        <form class="signup-form" method="post" action={% url 'accounts:signup' %}>
            {% csrf_token %}
            <div class="each-input">
                <label for="name">이름</label>
                <input type="text" id="name" class="input-box" placeholder="이름을 입력하세요." name="username">
            </div>
            <div class="each-input">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" class="input-box" placeholder="닉네임을 입력하세요." name="nickname">
            </div>
            <div class="each-input">
                <label for="email">이메일</label>
                <input type="email" id="email" class="input-box" placeholder="이메일을 입력하세요." name="email">
            </div>
            <div class="each-input">
                <label for="password">비밀번호</label>
                <input type="password" id="password" class="input-box" placeholder="숫자/문자 조합, 최소 8자 이상" name="password1">
            </div>
            <div class="each-input">
                <label for="confirm-password">비밀번호 재입력</label>
                <input type="password" id="confirm-password" class="input-box" placeholder="비밀번호를 재입력하세요." name="password2">
            </div>
            <input type="submit" id="signup-btn" class="submit-btn" value="회원가입">
        </form>
    </div>
    
    <script src="{% static 'js/reviewSignup.js' %}"></script>
</body>
</html>
